version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    #Hardening: Limit resources to protect the host system
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    networks:
      - md5eval_net

  nginx:
    # Hardening: trivy detected Alpine has many vuln. Using good ol' wolfi.
    image: cgr.dev/chainguard/nginx:latest
    ports:
      - "80:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - md5eval_net

networks:
  md5eval_net:
    driver: bridge
